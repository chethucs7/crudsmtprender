{% extends "layout.html" %}
{% block title %}Login - Antigravity{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Welcome Back</h1>
    <form id="login-form">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="name@company.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" id="btn-text">
            Login
        </button>
    </form>
    <div class="auth-links">
        <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>
        <p><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p>
    </div>
</div>
{% endblock %}
