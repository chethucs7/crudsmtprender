{% extends "layout.html" %}
{% block title %}Verify OTP - Antigravity{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Verify Your Email</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">We've sent a 6-digit code to your email.</p>
    <form id="verify-form">
        <div class="input-group">
            <label>OTP Code</label>
            <input type="text" id="otp" required maxlength="6" placeholder="123456" style="letter-spacing: 1rem; text-align: center; font-size: 1.5rem;">
        </div>
        <button type="submit">
            Verify & Create Account
        </button>
    </form>
</div>
{% endblock %}
