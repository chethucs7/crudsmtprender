{% extends "layout.html" %}
{% block title %}Forgot Password - Antigravity{% endblock %}
{% block content %}
<div class="auth-card" id="forgot-step-1">
    <h1>Forgot Password</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">Enter your email to receive an OTP.</p>
    <form id="forgot-form">
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="name@company.com">
        </div>
        <button type="submit">Send OTP</button>
    </form>
    <div class="auth-links">
        <p><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
    </div>
</div>

<div class="auth-card" id="forgot-step-2" style="display: none;">
    <h1>Verify OTP</h1>
    <form id="forgot-verify-form">
        <div class="input-group">
            <label>OTP Code</label>
            <input type="text" id="otp-reset" required maxlength="6" placeholder="123456" style="letter-spacing: 1rem; text-align: center; font-size: 1.5rem;">
        </div>
        <button type="submit">Verify OTP</button>
    </form>
</div>

<div class="auth-card" id="forgot-step-3" style="display: none;">
    <h1>New Password</h1>
    <form id="reset-form">
        <div class="input-group">
            <label>New Password</label>
            <input type="password" id="new-password" required placeholder="••••••••">
        </div>
        <button type="submit">Reset Password</button>
    </form>
</div>
{% endblock %}
